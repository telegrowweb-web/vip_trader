    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --r3: #ff9900;
      --dark: #080300;
      --bdr: rgba(255,80,0,0.22);

    html, body {

      font-family: 'Inter', sans-serif;
      color: var(--txt);
      overflow: hidden;

    /* ── BG ── */
    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 25% 0%,   rgba(255,50,0,0.14)  0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%,  rgba(255,120,0,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 40%,   rgba(255,30,0,0.05)  0%, transparent 55%);
    }

    /* Chart lines bg */
    .chart-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .chart-bg svg {
      position: absolute; bottom: 0; width: 100%; height: 55%; opacity: .05;
    }

    /* Scan line */
    .scan {
      position: fixed; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,100,0,0.5), transparent);
      z-index: 0; pointer-events: none;
      animation: scanMove 9s linear infinite;
    }
    @keyframes scanMove {
      0%   { top:-2px; opacity:0; }
      5%   { opacity:1; }
      95%  { opacity:.3; }
      100% { top:100%; opacity:0; }
    }

    /* Fire particles */
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .p { position: absolute; border-radius: 50%; animation: pFloat linear infinite; opacity: 0; }
    .p1 { width:3px;height:3px; background:#ff6600; left:5%;  top:20%; animation-duration:6s;   animation-delay:0s; }
    .p2 { width:2px;height:2px; background:#ff9900; left:15%; top:60%; animation-duration:8s;   animation-delay:1s; }
    .p3 { width:4px;height:4px; background:#ff3300; left:25%; top:30%; animation-duration:7s;   animation-delay:2s; }
    .p4 { width:2px;height:2px; background:#ff6600; left:40%; top:70%; animation-duration:9s;   animation-delay:.5s; }
    .p5 { width:3px;height:3px; background:#ff9900; left:58%; top:15%; animation-duration:6.5s; animation-delay:3s; }
    .p6 { width:2px;height:2px; background:#ff3300; left:68%; top:80%; animation-duration:8s;   animation-delay:1.5s; }
    .p7 { width:3px;height:3px; background:#ff6600; left:80%; top:40%; animation-duration:7s;   animation-delay:2.5s; }
    .p8 { width:2px;height:2px; background:#ff9900; left:90%; top:25%; animation-duration:9s;   animation-delay:0s; }
    @keyframes pFloat {
      0%   { opacity:0; transform:translateY(0) scale(.5); }
      20%  { opacity:.9; }
      80%  { opacity:.4; }
      100% { opacity:0; transform:translateY(-70px) scale(1.2); }
    }

    /* Glow orbs */
    .orb { position:fixed; border-radius:50%; filter:blur(80px); z-index:0; pointer-events:none; }
    .orb1 { width:300px; height:300px; background:rgba(255,50,0,0.12);  top:-80px;    right:-60px; animation:orbF 9s ease-in-out infinite alternate; }
    .orb2 { width:220px; height:220px; background:rgba(255,120,0,0.09); bottom:-60px; left:-40px;  animation:orbF 11s ease-in-out infinite alternate-reverse; }
    @keyframes orbF { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(18px,22px) scale(1.1)} }

    /* ═══════════════════════ PAGE ═══════════════════════ */
    .page {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px 24px 34px;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .hdr {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
      animation: fadeUp .5s ease both;

    .hdr-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--r2),transparent); max-width:55px; }
    .hdr-txt {
      font-family: 'Syne', sans-serif;
      font-size: 9px; font-weight: 800;
      letter-spacing: .5em; color: var(--r2);
      text-transform: uppercase; opacity: .9;

      margin-bottom: 4px;

    .logo-outer { position: relative; width: 110px; height: 110px; }

    .lb1 {
      position: absolute; inset: -5px; border-radius: 50%;
      border: 2px solid transparent;
      background:
        linear-gradient(var(--dark), var(--dark)) padding-box,
        conic-gradient(var(--r1) 0%, var(--r2) 25%, var(--r3) 50%, var(--r2) 75%, var(--r1) 100%) border-box;
      animation: bSpin 4s linear infinite;
    }
    .lb2 {
      position: absolute; inset: -12px; border-radius: 50%;
      border: 1px solid transparent;
      background:
        linear-gradient(var(--dark), var(--dark)) padding-box,
        conic-gradient(transparent 0%, var(--r2) 30%, transparent 60%, var(--r3) 90%, transparent 100%) border-box;
      animation: bSpin 7s linear infinite reverse;
      opacity: .35;
    }
    .l-img {
      position: absolute; inset: 0; border-radius: 50%;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      background: #110500;
    }
    .l-img img { width:100%; height:100%; object-fit:cover; }

    .ldot { position:absolute; width:7px; height:7px; border-radius:50%; background:var(--r2); box-shadow:0 0 10px var(--r1); }
    .ld1 { top:-3px;    left:50%;  transform:translateX(-50%); }
    .ld2 { bottom:-3px; left:50%;  transform:translateX(-50%); }
    .ld3 { left:-3px;   top:50%;   transform:translateY(-50%); }
    .ld4 { right:-3px;  top:50%;   transform:translateY(-50%); }
    @keyframes bSpin { to { transform:rotate(360deg); } }

    .vip-tag {
      margin-top: 12px;

      border-radius: 3px; padding: 4px 16px;

      letter-spacing: .4em; color: #fff;
      text-transform: uppercase;
      box-shadow: 0 0 18px rgba(255,80,0,.5);
      animation: tagGlow 2s ease-in-out infinite alternate;

    @keyframes tagGlow {

      100% { box-shadow:0 0 28px rgba(255,80,0,.8); }

    /* ── TITLE — SMALLER FONT ── */
    .title-wrap {

      animation: fadeUp .5s .14s ease both;
    }
    .pre-title {
      font-size: 9px; font-weight: 600;
      letter-spacing: .4em; color: var(--mut);

    h1 {

      font-size: clamp(22px, 5.5vw, 42px);   /* ← SMALLER than before */

      text-shadow: 0 0 40px rgba(255,80,0,.25);
    }
    h1 .v { color: var(--r1); text-shadow: 0 0 22px rgba(255,30,0,.8); }
    h1 .t { color: var(--r2); text-shadow: 0 0 22px rgba(255,100,0,.7); }
    .tagline {
      margin-top: 7px;
      font-size: clamp(10px, 2.2vw, 12.5px);
      color: var(--mut); font-weight: 400;
      letter-spacing: .04em; line-height: 1.6;
    }
    .tagline .hi { color: var(--r3); font-weight: 700; }

    /* ── LIVE TICKER ── */
    .ticker-row {
      display: flex; gap: 7px; align-items: center;
      margin-top: 13px;
      animation: fadeUp .5s .22s ease both;
    }
    .ti {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,80,0,.15);
      border-radius: 5px; padding: 5px 9px;
      font-size: 10px; font-weight: 700; letter-spacing: .04em;
    }
    .tdot { width:5px; height:5px; border-radius:50%; flex-shrink:0; animation:tdBlink 1.2s ease-in-out infinite; }
    .tdot.g { background:var(--green); box-shadow:0 0 6px var(--green); }
    .tdot.r { background:var(--rred);  box-shadow:0 0 6px var(--rred); }
    .tv.g { color:var(--green); }
    .tv.r { color:var(--rred); }
    .tl { color:var(--mut); }
    @keyframes tdBlink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── FEATURE CARDS ── */
    .cards {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 8px; width: 100%; max-width: 340px;
      margin-top: 13px;
      animation: fadeUp .5s .30s ease both;
    }
    .card {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--bdr);
      border-radius: 10px; padding: 10px 5px; text-align: center;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top:0; left:0; right:0; height:1px;
      background: linear-gradient(90deg, transparent, var(--r2), transparent);

    .ci { font-size: 19px; display:block; margin-bottom:4px; }
    .cl { font-size: 8.5px; font-weight:700; color:var(--mut); text-transform:uppercase; letter-spacing:.07em; line-height:1.3; }

    /* ── STATS ── */
    .stats {
      display: flex; gap: 20px;
      margin-top: 13px;
      animation: fadeUp .5s .38s ease both;
    }
    .stat { text-align: center; }
    .sv {
      font-family: 'Syne', sans-serif; font-size: 21px;
      font-weight: 800; color: var(--r2); letter-spacing: .04em; line-height:1;
    }
    .sl { font-size:8.5px; color:var(--mut); text-transform:uppercase; letter-spacing:.1em; margin-top:2px; }
    .sdiv { width:1px; background:var(--bdr); align-self:stretch; }

    /* ── OUTLINE LINE BUTTON ── */
    .cta-wrap {
      width: 100%; max-width: 340px;
      margin-top: 16px;
      animation: fadeUp .5s .46s ease both;
    }
    .btn {
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 15px 28px; border-radius: 8px;
      background: transparent;
      border: 2px solid var(--r2);
      color: var(--r2);
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 14px; letter-spacing: .14em;
      text-transform: uppercase; text-decoration: none;
      cursor: pointer;
      transition: color .3s, border-color .3s;
      animation: btnPulse 2.2s ease-in-out infinite;
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--r1), var(--r2), var(--r3));
      opacity: 0; transition: opacity .3s; z-index: 0;
    }
    .btn:hover::before { opacity: 1; }
    .btn:hover { color: #fff; border-color: var(--r1); }
    .btn:hover .tg path { fill: #fff; }
    .btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.2) 50%, transparent 100%);
      transform: translateX(-100%);
      animation: shimmer 2.5s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes shimmer { 0%{transform:translateX(-100%)} 55%,100%{transform:translateX(100%)} }
    @keyframes btnPulse {
      0%,100% { transform:scale(1);    box-shadow:0 0 0 1px rgba(255,100,0,.2), 0 4px 20px rgba(255,80,0,.2); }
      50%      { transform:scale(1.04); box-shadow:0 0 0 3px rgba(255,100,0,.4), 0 8px 32px rgba(255,80,0,.45); }
    }
    .btn-inner { position:relative; z-index:2; display:flex; align-items:center; gap:10px; }
    .tg { width:18px; height:18px; flex-shrink:0; transition:all .3s; }
    .tg path { fill:var(--r2); transition:fill .3s; }

    /* Credit */
    .credit {
      position: fixed; bottom: 9px; left:0; right:0;
      text-align: center; font-size: 11px;
      color: var(--mut); z-index: 100; letter-spacing: .03em;

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }

      .btn { font-size: 13px; padding: 14px 18px; letter-spacing: .12em; border-radius: 8px; border-width: 2px; }

      .credit { font-size: 10px; bottom: 7px; }
    }

    /* Very small phones */
    @media (max-width: 370px) {
      .logo-outer { width: 86px; height: 86px; }
      h1 { font-size: 18px; }
      .ci { font-size: 15px; }
      .cl { font-size: 7.5px; }
      .sv { font-size: 17px; }
      .stats { gap: 12px; margin-top: 10px; }
      .cards { margin-top: 10px; gap: 5px; }
      .cta-wrap { margin-top: 12px; }
      .btn { font-size: 12px; padding: 12px 14px; }
      .ticker-row { margin-top: 9px; }
      .ti { font-size: 9px; padding: 4px 6px; }
      .title-wrap { margin-top: 10px; }

    }

    /* ══════════════════════════════════
       LAPTOP  ≥ 768px
    ══════════════════════════════════ */
    @media (min-width: 768px) {

      .tagline { font-size: 14px; }
      .title-wrap { margin-top: 16px; }
      .pre-title { font-size: 10px; letter-spacing: .42em; margin-bottom: 6px; }

      .ticker-row { margin-top: 16px; gap: 10px; }
      .ti { font-size: 11px; padding: 7px 14px; }

      .cards { max-width: 440px; gap: 10px; margin-top: 16px; }
      .card { padding: 14px 8px; }
      .ci { font-size: 24px; margin-bottom: 5px; }
      .cl { font-size: 10.5px; }

      .stats { gap: 28px; margin-top: 16px; }
      .sv { font-size: 26px; }
      .sl { font-size: 10px; }

      .cta-wrap { max-width: 440px; margin-top: 20px; }
      .btn { font-size: 16px; padding: 17px 36px; letter-spacing: .14em; border-width: 2px; }

      .hdr { margin-bottom: 12px; }
      .hdr-txt { font-size: 10px; letter-spacing: .5em; }
      .hdr-line { max-width: 70px; }
    }

    /* Large desktop */
    @media (min-width: 1200px) {
      .logo-outer { width: 148px; height: 148px; }
      h1 { font-size: 56px; }
      .cards { max-width: 500px; }
      .cta-wrap { max-width: 500px; }
    }
  </style>
